# Football analysis pipeline configuration.
# Paths under data/weights are placeholders until trained weights are added.

detection:
  weights_path: "data/weights/football_yolo.pt"  # football-trained YOLO26n checkpoint (0=ball, 1=player)
  confidence_threshold: 0.3
  slice_height: 512
  slice_width: 512
  overlap_height_ratio: 0.2
  overlap_width_ratio: 0.2
  # Maps detector class ids to pipeline roles — classes of the football-trained
  # checkpoint (see football_dataset_yolo/data.yaml).
  class_names:
    0: ball
    1: player
  # Detection region of interest (image-space pixel polygon, pitch boundary).
  # Detections whose foot point (bbox bottom-center) falls outside are dropped
  # -- filters crowd/sideline. Calibrated per camera/video. Set null for whole frame.
  roi_polygon:
    - [374, 682]
    - [748, 440]
    - [798, 399]
    - [859, 374]
    - [955, 328]
    - [970, 283]
    - [1031, 243]

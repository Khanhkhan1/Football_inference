tracking:
  track_activation_threshold: 0.25
  lost_track_buffer: 30
  minimum_matching_threshold: 0.8
  frame_rate: 25

clustering:
  algorithm: kmeans
  eps: 8.0          # used only when algorithm is dbscan
  min_samples: 2    # used only when algorithm is dbscan
  num_expected_groups: 2   # team A, team B

minimap:
  pitch_length_m: 105.0
  pitch_width_m: 68.0
  # Frame corner for the minimap overlay: top_left, top_right, bottom_left, or
  # bottom_right. Pick whichever stays clear of the pitch for this camera.
  position: top_right
  # Image-space pixel coordinates of the four pitch corners (order: far-left,
  # far-right, near-right, near-left), calibrated for this camera/video.
  source_keypoints:
    - [1158, 204]
    - [2581, 204]
    - [3524, 760]
    - [101, 836]
